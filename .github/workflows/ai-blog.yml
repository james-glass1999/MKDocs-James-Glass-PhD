name: AI Blog Draft

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 1 * *"

jobs:
  create-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Create draft post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python <<'PY'
          import anthropic
          from datetime import date
          from pathlib import Path

          today = date.today().isoformat()
          client = anthropic.Anthropic()

          message = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=1500,
              messages=[
                  {
                      "role": "user",
                      "content": (
                          "Write a technical writing blog post for this week. "
                          "Topics can include: API documentation, developer enablement, "
                          "docs-as-code, AI in technical writing, or style guides. "
                          "Format it in Markdown with a title, intro, 2-3 sections with headers, "
                          "and a conclusion. Keep it around 400-600 words. "
                          "Do not include front matter — just the body content starting with the # title."
                      )
                  }
              ]
          )

          generated_content = message.content[0].text

          front_matter = "---\n"
          front_matter += "date:\n"
          front_matter += f"  created: {today}\n"
          front_matter += "categories:\n"
          front_matter += "  - AI\n"
          front_matter += "tags:\n"
          front_matter += "  - ai agents\n"
          front_matter += "  - technical writing\n"
          front_matter += "  - developer enablement\n"
          front_matter += "---\n"

          admonition = '!!! info "AI-assisted content"\n'
          admonition += "    This article was generated with AI and reviewed by James Glass.\n"

          content = front_matter + "\n" + admonition + "\n" + generated_content

          filename = Path("docs/blog/posts") / f"{today}-ai-weekly-draft.md"
          filename.parent.mkdir(parents=True, exist_ok=True)
          filename.write_text(content, encoding="utf-8")
          print(f"Created {filename}")
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/blog/posts/
          git diff --cached --quiet || git commit -m "Add AI blog draft"

      - name: Push changes
        run: git push