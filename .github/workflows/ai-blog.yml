name: AI Blog Draft
permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  create-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: Create draft post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python <<'PY'
          from openai import OpenAI
          from datetime import date
          from pathlib import Path

          today = date.today().isoformat()
          client = OpenAI()

          message = client.chat.completions.create(
              model="gpt-4o",
              max_tokens=1500,
              messages=[
                  {
                      "role": "user",
                      "content": (
                          "Write a technical writing blog post for this week. "
                          "Topics can include: API documentation, developer enablement, "
                          "docs-as-code, AI in technical writing, or style guides. "
                          "Format it in Markdown with a title, intro, 2-3 sections with headers, "
                          "and a conclusion. Keep it around 400-600 words. "
                          "Do not include front matter — just the body content starting with the # title."
                      )
                  }
              ]
          )

          generated_content = message.choices[0].message.content

          filename = Path("docs/blog/posts") / f"{today}-ai-weekly-draft.md"
          filename.parent.mkdir(parents=True, exist_ok=True)

          content = f"""---
date:
  created: {today}
categories:
  - AI
tags:
  - ai agents
  - technical writing
  - developer enablement
---

!!! info "AI-assisted content"
    This article was generated with AI and reviewed by James Glass.

{generated_content}
"""
          filename.write_text(content, encoding="utf-8")
          print(f"Created {filename}")
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/blog/posts/
          git diff --cached --quiet || git commit -m "Add AI blog draft"

      - name: Push changes
        run: git push