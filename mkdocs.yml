site_name: "James Glass | Technical Writing | Developer Enablement | AI-Driven Docs"
site_url: https://thewritingtimes.blog

theme:
  name: material
  font:
    text: Merriweather Sans
  logo: assets/james2.png
  favicon: assets/james1.png
  features:
    - navigation.tabs
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - navigation.expand
    - navigation.path
    - search.share
    - search.highlight
    - search.suggest
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - header.autohide

  palette:
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: green
      accent: deep-purple

    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep-orange

plugins:
  - search
  - blog

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details

